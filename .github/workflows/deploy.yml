name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths:
      - 'server-smart-caregiver/**' # Hanya jalan jika ada perubahan di folder ini

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server-smart-caregiver # Menentukan folder kerja utama

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          uv sync
          npm install

      - name: Deploy to Cloudflare
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
